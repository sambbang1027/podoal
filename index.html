    <title>🍇 포도알 파이터</title>
    <script>
      // 404.html에서 리다이렉트된 경로 복원
      (function () {
        var p = new URLSearchParams(window.location.search).get('p')
        if (p) {
          var hash = new URLSearchParams(window.location.search).get('hash')
          window.history.replaceState(
            null, null,
            '/' + p + (hash ? '#' + hash : '')
          )
        }
      })()
    </script>
